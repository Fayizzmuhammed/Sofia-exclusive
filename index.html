<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sofia Hazl</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --sky: #38b6ff;
  --sky-dark: #1a9de8;
  --sky-light: #a8dcff;
  --white: #ffffff;
  --off: #f4f8fc;
  --text: #1a2535;
  --muted: #6b7f99;
}

html, body {
  min-height: 100vh;
  font-family: 'Sora', sans-serif;
  background: var(--off);
  display: block;
  overflow-x: hidden;
}
body { display: flex; justify-content: center; align-items: flex-start; }

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse 80% 40% at 50% 0%, rgba(56,182,255,0.28) 0%, transparent 55%),
    linear-gradient(180deg, #e8f4ff 0%, #f4f8fc 40%, #ffffff 100%);
  z-index: 0;
  pointer-events: none;
}

/* Floating bubbles */
.bubble {
  position: fixed;
  border-radius: 50%;
  background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.95), rgba(56,182,255,0.25));
  pointer-events: none;
  z-index: 0;
  animation: floatUp linear infinite;
  box-shadow: inset 0 0 6px rgba(255,255,255,0.5);
}
@keyframes floatUp {
  0%   { transform: translateY(110vh) scale(0.7); opacity: 0; }
  8%   { opacity: 0.7; }
  92%  { opacity: 0.25; }
  100% { transform: translateY(-12vh) scale(1.1); opacity: 0; }
}

.page {
  width: 100%;
  max-width: 430px;
  min-height: 100vh;
  padding: 0 0 3.5rem;
  display: flex;
  flex-direction: column;
  align-items: center;
  position: relative;
  z-index: 1;
}

/* === BANNER === */
.banner {
  width: 100%;
  height: 155px;
  background: linear-gradient(135deg, #38b6ff 0%, #1a9de8 55%, #0d7fc4 100%);
  position: relative;
  overflow: hidden;
  flex-shrink: 0;
}
.banner-glow1 {
  position: absolute;
  top: -40px; left: -40px;
  width: 220px; height: 220px;
  background: radial-gradient(circle, rgba(255,255,255,0.28) 0%, transparent 65%);
  animation: glowDrift 5s ease-in-out infinite;
}
.banner-glow2 {
  position: absolute;
  bottom: -30px; right: -20px;
  width: 160px; height: 160px;
  background: radial-gradient(circle, rgba(255,255,255,0.15) 0%, transparent 65%);
  animation: glowDrift 5s ease-in-out infinite reverse;
}
@keyframes glowDrift {
  0%, 100% { transform: translate(0,0); }
  50% { transform: translate(30px, 15px); }
}
.banner-wave {
  position: absolute;
  bottom: -1px; left: 0; right: 0;
}

/* === AVATAR === */
.avatar-wrap {
  margin-top: -62px;
  position: relative;
  z-index: 10;
  margin-bottom: 0.9rem;
  cursor: pointer;
  animation: popIn 0.7s cubic-bezier(0.16,1,0.3,1) 0.1s both;
}
@keyframes popIn {
  0% { opacity: 0; transform: scale(0.6) translateY(20px); }
  100% { opacity: 1; transform: scale(1) translateY(0); }
}
.avatar-ring {
  width: 120px; height: 120px;
  border-radius: 50%;
  padding: 4px;
  background: conic-gradient(from 0deg, #38b6ff, #ffffff, #1a9de8, #38b6ff);
  animation: spin 4s linear infinite;
  box-shadow: 0 8px 36px rgba(56,182,255,0.45), 0 0 0 5px rgba(255,255,255,0.95);
  transition: transform 0.3s cubic-bezier(0.16,1,0.3,1), box-shadow 0.3s;
}
.avatar-ring:hover {
  transform: scale(1.05);
  box-shadow: 0 14px 48px rgba(56,182,255,0.6), 0 0 0 5px rgba(255,255,255,0.95);
}
@keyframes spin {
  to { filter: hue-rotate(30deg); }
}
.avatar-inner {
  width: 100%; height: 100%;
  border-radius: 50%;
  background: #d8eeff;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  position: relative;
  border: 3.5px solid white;
}
.avatar-inner img {
  width: 100%; height: 100%;
  object-fit: cover;
  display: none;
  position: absolute; inset: 0;
  border-radius: 50%;
}
.avatar-inner.has-image img { display: block; }
.avatar-inner.has-image .avatar-ph { display: none; }
.avatar-ph {
  display: flex; flex-direction: column;
  align-items: center; gap: 3px;
  color: var(--sky-dark);
}
.avatar-ph span:first-child { font-size: 1.9rem; }
.avatar-ph span:last-child { font-size: 0.42rem; text-transform: uppercase; letter-spacing: 0.1em; font-weight: 700; }
#avatarInput { display: none; }

/* Blue verified badge on avatar */
.v-badge {
  position: absolute;
  bottom: 6px; right: 6px;
  width: 30px; height: 30px;
  border-radius: 50%;
  background: #1877f2;
  border: 3px solid white;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 3px 12px rgba(24,119,242,0.55);
  animation: badgeBounce 0.5s cubic-bezier(0.16,1,0.3,1) 0.7s both;
  z-index: 2;
}
@keyframes badgeBounce {
  0% { transform: scale(0) rotate(-20deg); opacity: 0; }
  70% { transform: scale(1.2) rotate(5deg); }
  100% { transform: scale(1) rotate(0); opacity: 1; }
}

/* === NAME === */
.profile-name {
  font-family: 'DM Serif Display', serif;
  font-size: 1.85rem;
  color: var(--text);
  text-align: center;
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 0.3rem;
  animation: slideUp 0.6s cubic-bezier(0.16,1,0.3,1) 0.25s both;
}
.name-check {
  width: 26px; height: 26px;
  background: #1877f2;
  border-radius: 50%;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  box-shadow: 0 3px 12px rgba(24,119,242,0.45);
  animation: badgeBounce 0.5s cubic-bezier(0.16,1,0.3,1) 0.8s both;
}

.profile-sub {
  font-size: 0.7rem;
  font-weight: 600;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--muted);
  text-align: center;
  margin-bottom: 1.8rem;
  animation: slideUp 0.6s cubic-bezier(0.16,1,0.3,1) 0.35s both;
}

@keyframes slideUp {
  0% { opacity: 0; transform: translateY(22px); }
  100% { opacity: 1; transform: translateY(0); }
}

/* === LINKS === */
.links {
  width: calc(100% - 2.8rem);
  display: flex;
  flex-direction: column;
  gap: 0.75rem;
}

.link-btn {
  display: flex;
  align-items: center;
  gap: 13px;
  padding: 1rem 1.1rem;
  border-radius: 18px;
  text-decoration: none;
  font-size: 0.94rem;
  font-weight: 600;
  font-family: 'Sora', sans-serif;
  transition: transform 0.25s cubic-bezier(0.16,1,0.3,1), box-shadow 0.25s;
  position: relative;
  overflow: hidden;
  border: none;
  width: 100%;
  text-align: left;
  cursor: pointer;
}
.link-btn:hover { transform: translateY(-3px) scale(1.015); }
.link-btn:active { transform: scale(0.97); }

/* Shimmer sweep */
.link-btn::before {
  content: '';
  position: absolute;
  top: 0; left: -80%;
  width: 50%; height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.22), transparent);
  transform: skewX(-18deg);
  transition: none;
}
.link-btn:hover::before {
  animation: sweep 0.55s ease forwards;
}
@keyframes sweep {
  to { left: 160%; }
}

/* PRIMARY */
.link-primary {
  background: linear-gradient(135deg, #38b6ff 0%, #1a9de8 70%, #0d7fc4 100%);
  color: white;
  box-shadow: 0 6px 22px rgba(56,182,255,0.45);
}
.link-primary:hover { box-shadow: 0 10px 36px rgba(56,182,255,0.6); color: white; }

/* CARD */
.link-card {
  background: white;
  color: var(--text);
  box-shadow: 0 2px 14px rgba(56,182,255,0.1), 0 1px 4px rgba(0,0,0,0.05);
  border: 1.5px solid rgba(56,182,255,0.14);
}
.link-card:hover {
  box-shadow: 0 8px 28px rgba(56,182,255,0.2), 0 2px 8px rgba(0,0,0,0.07);
  border-color: rgba(56,182,255,0.32);
  color: var(--text);
}

.link-icon {
  width: 40px; height: 40px;
  border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.i-star  { background: rgba(255,255,255,0.22); font-size: 1.1rem; }
.i-yt    { background: #ff0000; }
.i-ig    { background: linear-gradient(135deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888); }
.i-fb    { background: #1877f2; }
.i-tw    { background: #000; }

.link-label { flex: 1; }
.link-arrow {
  width: 30px; height: 30px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.1rem;
  font-weight: 300;
  transition: transform 0.2s;
}
.link-primary .link-arrow { background: rgba(255,255,255,0.2); color: white; }
.link-card    .link-arrow { background: rgba(56,182,255,0.1); color: var(--sky-dark); }
.link-btn:hover .link-arrow { transform: translateX(3px); }

/* Stagger */
.links .link-btn:nth-child(1) { animation: slideUp 0.6s cubic-bezier(0.16,1,0.3,1) 0.4s both; }
.links .link-btn:nth-child(2) { animation: slideUp 0.6s cubic-bezier(0.16,1,0.3,1) 0.5s both; }
.links .link-btn:nth-child(3) { animation: slideUp 0.6s cubic-bezier(0.16,1,0.3,1) 0.6s both; }
.links .link-btn:nth-child(4) { animation: slideUp 0.6s cubic-bezier(0.16,1,0.3,1) 0.7s both; }
.links .link-btn:nth-child(5) { animation: slideUp 0.6s cubic-bezier(0.16,1,0.3,1) 0.8s both; }

/* FOOTER */
.footer {
  margin-top: 2.2rem;
  font-size: 0.68rem;
  color: var(--muted);
  opacity: 0.65;
  animation: slideUp 0.6s cubic-bezier(0.16,1,0.3,1) 1s both;
}



.sep-line-right {
  background: linear-gradient(90deg, rgba(56,182,255,0.2), transparent);
}

</style>
</head>
<body>

<!-- Floating bubbles -->
<div class="bubble" style="width:16px;height:16px;left:7%;animation-duration:9s;animation-delay:0s;"></div>
<div class="bubble" style="width:10px;height:10px;left:20%;animation-duration:12s;animation-delay:2.5s;"></div>
<div class="bubble" style="width:22px;height:22px;left:78%;animation-duration:8s;animation-delay:0.8s;"></div>
<div class="bubble" style="width:8px;height:8px;left:90%;animation-duration:14s;animation-delay:3s;"></div>
<div class="bubble" style="width:14px;height:14px;left:52%;animation-duration:10s;animation-delay:1.5s;"></div>
<div class="bubble" style="width:18px;height:18px;left:35%;animation-duration:11s;animation-delay:4.5s;"></div>
<div class="bubble" style="width:9px;height:9px;left:62%;animation-duration:13s;animation-delay:2s;"></div>

<div class="page">

  <!-- Banner -->
  <div class="banner">
    <div class="banner-glow1"></div>
    <div class="banner-glow2"></div>
    <div class="banner-wave">
      <svg viewBox="0 0 430 32" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none" width="100%" height="32">
        <path d="M0,16 C72,30 144,2 216,16 C288,30 360,2 430,16 L430,32 L0,32 Z" fill="#f4f8fc"/>
      </svg>
    </div>
  </div>

  <!-- Avatar -->
  <div class="avatar-wrap" onclick="document.getElementById('avatarInput').click()">
    <div class="avatar-ring">
      <div class="avatar-inner" id="avatarBox">
        <img id="avatarImg" src="" alt="Sofia Hazl">
        <div class="avatar-ph">
          <span>📷</span>
          <span>Add Photo</span>
        </div>
      </div>
    </div>
    <div class="v-badge">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
        <path d="M2.5 7L5.5 10L11.5 4" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
  </div>
  <input type="file" id="avatarInput" accept="image/*">

  <!-- Name -->
  <div class="profile-name">
    Sofia Hazl
    <span class="name-check">
      <svg width="13" height="13" viewBox="0 0 13 13" fill="none">
        <path d="M2 6.5L5 9.5L11 3.5" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </span>
  </div>
  <div class="profile-sub">Model &amp; Content Creator</div>

  <!-- Links -->
  <div class="links">

    <a href="#" class="link-btn link-primary" onclick="return false;">
      <div class="link-icon i-star">⭐</div>
      <span class="link-label">Exclusive Content</span>
      <div class="link-arrow">›</div>
    </a>

    <a href="#" class="link-btn link-card" onclick="return false;">
      <div class="link-icon i-yt">
        <svg width="20" height="14" viewBox="0 0 20 14" fill="white">
          <path d="M19.582 2.186A2.506 2.506 0 0017.818.418C16.254 0 10 0 10 0S3.746 0 2.182.418A2.506 2.506 0 00.418 2.186C0 3.754 0 7 0 7s0 3.246.418 4.814a2.506 2.506 0 001.764 1.768C3.746 14 10 14 10 14s6.254 0 7.818-.418a2.506 2.506 0 001.764-1.768C20 10.246 20 7 20 7s0-3.246-.418-4.814zM8 10V4l5.333 3L8 10z"/>
        </svg>
      </div>
      <span class="link-label">YouTube</span>
      <div class="link-arrow">›</div>
    </a>

    <a href="#" class="link-btn link-card" onclick="return false;">
      <div class="link-icon i-ig">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="white">
          <path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.163 6.162 6.163 6.162-2.759 6.162-6.163c0-3.403-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.79-4-4 0-2.209 1.791-4 4-4s4 1.791 4 4c0 2.21-1.791 4-4 4zm6.406-11.845c-.796 0-1.441.645-1.441 1.44s.645 1.44 1.441 1.44c.795 0 1.439-.645 1.439-1.44s-.644-1.44-1.439-1.44z"/>
        </svg>
      </div>
      <span class="link-label">Instagram</span>
      <div class="link-arrow">›</div>
    </a>

    <a href="#" class="link-btn link-card" onclick="return false;">
      <div class="link-icon i-fb">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="white">
          <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>
        </svg>
      </div>
      <span class="link-label">Facebook</span>
      <div class="link-arrow">›</div>
    </a>

    <a href="#" class="link-btn link-card" onclick="return false;">
      <div class="link-icon i-tw">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="white">
          <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.744l7.737-8.835L1.254 2.25H8.08l4.259 5.631 5.905-5.631zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
        </svg>
      </div>
      <span class="link-label">Twitter / X</span>
      <div class="link-arrow">›</div>
    </a>

  </div>

  <div class="footer">© 2025 Sofia Hazl · All rights reserved</div>

</div>

<script>
document.getElementById('avatarInput').addEventListener('change', function(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(ev) {
    document.getElementById('avatarImg').src = ev.target.result;
    document.getElementById('avatarBox').classList.add('has-image');
  };
  reader.readAsDataURL(file);
});
</script>
</body>
</html>
