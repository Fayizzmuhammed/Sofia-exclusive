<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sofia Hazl</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --sky: #38b6ff; --sky-dark: #1a9de8; --sky-light: #a8dcff;
  --white: #ffffff; --off: #f4f8fc; --text: #1a2535; --muted: #6b7f99;
}
html, body { min-height: 100vh; font-family: 'Sora', sans-serif; background: var(--off); display: block; overflow-x: hidden; }
body { display: flex; justify-content: center; align-items: flex-start; }
body::before {
  content: ''; position: fixed; inset: 0;
  background: radial-gradient(ellipse 80% 40% at 50% 0%, rgba(56,182,255,0.28) 0%, transparent 55%), linear-gradient(180deg, #e8f4ff 0%, #f4f8fc 40%, #ffffff 100%);
  z-index: 0; pointer-events: none;
}
.bubble { position: fixed; border-radius: 50%; background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.95), rgba(56,182,255,0.25)); pointer-events: none; z-index: 0; animation: floatUp linear infinite; box-shadow: inset 0 0 6px rgba(255,255,255,0.5); }
@keyframes floatUp { 0% { transform: translateY(110vh) scale(0.7); opacity: 0; } 8% { opacity: 0.7; } 92% { opacity: 0.25; } 100% { transform: translateY(-12vh) scale(1.1); opacity: 0; } }
.page { width: 100%; max-width: 430px; min-height: 100vh; padding: 0 0 3.5rem; display: flex; flex-direction: column; align-items: center; position: relative; z-index: 1; }
.banner { width: 100%; height: 155px; background: linear-gradient(135deg, #38b6ff 0%, #1a9de8 55%, #0d7fc4 100%); position: relative; overflow: hidden; flex-shrink: 0; }
.banner-glow1 { position: absolute; top: -40px; left: -40px; width: 220px; height: 220px; background: radial-gradient(circle, rgba(255,255,255,0.28) 0%, transparent 65%); animation: glowDrift 5s ease-in-out infinite; }
.banner-glow2 { position: absolute; bottom: -30px; right: -20px; width: 160px; height: 160px; background: radial-gradient(circle, rgba(255,255,255,0.15) 0%, transparent 65%); animation: glowDrift 5s ease-in-out infinite reverse; }
@keyframes glowDrift { 0%, 100% { transform: translate(0,0); } 50% { transform: translate(30px, 15px); } }
.banner-wave { position: absolute; bottom: -1px; left: 0; right: 0; }
.avatar-wrap { margin-top: -75px; position: relative; z-index: 10; margin-bottom: 0.9rem; cursor: pointer; animation: popIn 0.7s cubic-bezier(0.16,1,0.3,1) 0.1s both; }
@keyframes popIn { 0% { opacity: 0; transform: scale(0.6) translateY(20px); } 100% { opacity: 1; transform: scale(1) translateY(0); } }
.avatar-ring { width: 150px; height: 150px; border-radius: 50%; padding: 4px; background: conic-gradient(from 0deg, #38b6ff, #ffffff, #1a9de8, #38b6ff); animation: spin 4s linear infinite; box-shadow: 0 8px 36px rgba(56,182,255,0.45), 0 0 0 5px rgba(255,255,255,0.95); transition: transform 0.3s cubic-bezier(0.16,1,0.3,1), box-shadow 0.3s; }
.avatar-ring:hover { transform: scale(1.05); box-shadow: 0 14px 48px rgba(56,182,255,0.6), 0 0 0 5px rgba(255,255,255,0.95); }
@keyframes spin { to { filter: hue-rotate(30deg); } }
.avatar-inner { width: 100%; height: 100%; border-radius: 50%; background: #d8eeff; overflow: hidden; display: flex; align-items: center; justify-content: center; flex-direction: column; position: relative; border: 3.5px solid white; }
.avatar-inner img { width: 100%; height: 100%; object-fit: cover; object-position: 50% 15%; display: block; position: absolute; inset: 0; border-radius: 50%; }
.v-badge { position: absolute; bottom: 6px; right: 6px; width: 30px; height: 30px; border-radius: 50%; background: #1877f2; border: 3px solid white; display: flex; align-items: center; justify-content: center; box-shadow: 0 3px 12px rgba(24,119,242,0.55); animation: badgeBounce 0.5s cubic-bezier(0.16,1,0.3,1) 0.7s both; z-index: 2; }
@keyframes badgeBounce { 0% { transform: scale(0) rotate(-20deg); opacity: 0; } 70% { transform: scale(1.2) rotate(5deg); } 100% { transform: scale(1) rotate(0); opacity: 1; } }
.profile-name { font-family: 'DM Serif Display', serif; font-size: 1.85rem; color: var(--text); text-align: center; display: flex; align-items: center; gap: 8px; margin-bottom: 0.3rem; animation: slideUp 0.6s cubic-bezier(0.16,1,0.3,1) 0.25s both; }
.name-check { width: 26px; height: 26px; background: #1877f2; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; flex-shrink: 0; box-shadow: 0 3px 12px rgba(24,119,242,0.45); animation: badgeBounce 0.5s cubic-bezier(0.16,1,0.3,1) 0.8s both; }
.profile-sub { font-size: 0.7rem; font-weight: 600; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted); text-align: center; margin-bottom: 1.8rem; animation: slideUp 0.6s cubic-bezier(0.16,1,0.3,1) 0.35s both; }
@keyframes slideUp { 0% { opacity: 0; transform: translateY(22px); } 100% { opacity: 1; transform: translateY(0); } }
.links { width: calc(100% - 2.8rem); display: flex; flex-direction: column; gap: 0.75rem; }
.link-btn { display: flex; align-items: center; gap: 13px; padding: 1rem 1.1rem; border-radius: 18px; text-decoration: none; font-size: 0.94rem; font-weight: 600; font-family: 'Sora', sans-serif; transition: transform 0.25s cubic-bezier(0.16,1,0.3,1), box-shadow 0.25s; position: relative; overflow: hidden; border: none; width: 100%; text-align: left; cursor: pointer; }
.link-btn:hover { transform: translateY(-3px) scale(1.015); }
.link-btn:active { transform: scale(0.97); }
.link-btn::before { content: ''; position: absolute; top: 0; left: -80%; width: 50%; height: 100%; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.22), transparent); transform: skewX(-18deg); transition: none; }
.link-btn:hover::before { animation: sweep 0.55s ease forwards; }
@keyframes sweep { to { left: 160%; } }
.link-primary { background: linear-gradient(135deg, #38b6ff 0%, #1a9de8 70%, #0d7fc4 100%); color: white; box-shadow: 0 6px 22px rgba(56,182,255,0.45); }
.link-primary:hover { box-shadow: 0 10px 36px rgba(56,182,255,0.6); color: white; }
.link-card { background: white; color: var(--text); box-shadow: 0 2px 14px rgba(56,182,255,0.1), 0 1px 4px rgba(0,0,0,0.05); border: 1.5px solid rgba(56,182,255,0.14); }
.link-card:hover { box-shadow: 0 8px 28px rgba(56,182,255,0.2), 0 2px 8px rgba(0,0,0,0.07); border-color: rgba(56,182,255,0.32); color: var(--text); }
.link-icon { width: 40px; height: 40px; border-radius: 12px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.i-star { background: rgba(255,255,255,0.22); font-size: 1.1rem; }
.i-yt { background: #ff0000; }
.i-ig { background: linear-gradient(135deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888); }
.i-fb { background: #1877f2; }
.i-tw { background: #000; }
.link-label { flex: 1; }
.link-arrow { width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; font-weight: 300; transition: transform 0.2s; }
.link-primary .link-arrow { background: rgba(255,255,255,0.2); color: white; }
.link-card .link-arrow { background: rgba(56,182,255,0.1); color: var(--sky-dark); }
.link-btn:hover .link-arrow { transform: translateX(3px); }
.links .link-btn:nth-child(1) { animation: slideUp 0.6s cubic-bezier(0.16,1,0.3,1) 0.4s both; }
.links .link-btn:nth-child(2) { animation: slideUp 0.6s cubic-bezier(0.16,1,0.3,1) 0.5s both; }
.links .link-btn:nth-child(3) { animation: slideUp 0.6s cubic-bezier(0.16,1,0.3,1) 0.6s both; }
.links .link-btn:nth-child(4) { animation: slideUp 0.6s cubic-bezier(0.16,1,0.3,1) 0.7s both; }
.links .link-btn:nth-child(5) { animation: slideUp 0.6s cubic-bezier(0.16,1,0.3,1) 0.8s both; }
.footer { margin-top: 2.2rem; font-size: 0.68rem; color: var(--muted); opacity: 0.65; animation: slideUp 0.6s cubic-bezier(0.16,1,0.3,1) 1s both; }
</style>
</head>
